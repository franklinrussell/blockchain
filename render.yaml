services:
  - type: web
    name: summitcoin-node
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health

    envVars:
      # Port the container listens on — Render routes external traffic here
      - key: PORT
        value: 8080
      # Supabase PostgreSQL connection string — set this in the Render dashboard.
      # When present, the node uses database persistence (survives restarts).
      # When absent, falls back to file persistence (local dev).
      - key: DATABASE_URL
        sync: false

